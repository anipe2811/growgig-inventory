# Host nginx vhost: redirect plain-HTTP requests for app.growgig.tech to HTTPS.
#
# WHY: on this VPS, Caddy (docker) only listens on :443; port :80 is owned by
# the host nginx which serves a DIFFERENT app. Anyone typing the URL without
# https:// hit that other app's 404 page. This vhost catches the hostname on
# :80 and 301s to HTTPS, where Caddy serves the inventory app.
#
# Install on the VPS:
#   cp deploy/nginx-app-growgig-redirect.conf /etc/nginx/sites-available/app.growgig.tech
#   ln -sf /etc/nginx/sites-available/app.growgig.tech /etc/nginx/sites-enabled/app.growgig.tech
#   nginx -t && systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name app.growgig.tech;
    return 301 https://$host$request_uri;
}
